<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveNet Tracker - KROK</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js core, converter, and WebGL backend -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <!-- Pose Detection models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>
<body>
    <div class="camera-stage">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>

        <div id="loading" class="status-overlay">
            <div class="spinner"></div>
            <span id="loadingText">Loading Model...</span>
        </div>

        <div class="hud hud-top">
            <div class="hud-title glass-panel">
                <h1>MoveNet Motion Tracker</h1>
                <a href="index.html">&larr; RTMPose</a>
            </div>
            <div id="stateLabel" class="state-label glass-panel hidden"></div>
            <span id="fpsCounter" class="hud-meta glass-panel">FPS: 0</span>
        </div>

        <div class="hud hud-bottom">
            <span id="statusText" class="hud-meta glass-panel">Initializing...</span>
            <div class="controls">
                <button id="startBtn" class="btn primary" disabled>Start Recording</button>
                <button id="endBtn" class="btn secondary" disabled>End & Save JSON</button>
            </div>
        </div>
    </div>

    <script src="js/movenet.js"></script>
</body>
</html>
